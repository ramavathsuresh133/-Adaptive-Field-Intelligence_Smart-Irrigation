services:
  - type: web
    name: adaptive-irrigation-api
    env: python
    pythonVersion: "3.11.9"
    buildCommand: pip install --prefer-binary -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
    rootDir: .
